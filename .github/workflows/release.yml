name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        shell: pwsh
        run: |
          node --check src/main.js
          node --check src/preload.js
          node --check src/renderer/app.js
          node --check src/zip.js

      - name: PDF smoke test
        run: npm run test:pdf

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            command: npm run build:win
            artifacts: |
              dist/MD-Reports-Setup-*.exe
              dist/MD-Reports-Portable-*.exe
              dist/latest.yml
          - name: Linux
            os: ubuntu-latest
            command: npm run build:linux
            artifacts: |
              dist/MD-Reports-*-Linux-*.AppImage
              dist/MD-Reports-*-Linux-*.deb
          - name: macOS
            os: macos-latest
            command: npm run build:mac
            artifacts: |
              dist/MD-Reports-*-macOS-*.dmg
              dist/MD-Reports-*-macOS-*.zip

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ matrix.command }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-reports-${{ matrix.name }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: MD Отчёты ${{ github.ref_name }}
          body_path: RELEASE-NOTES-${{ github.ref_name }}.md
          make_latest: true
          files: release-assets/*
